<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; media-src 'self'; style-src 'self'; script-src 'none';">
    <meta name="description" content="HoyoPlay — The click that launched a thousand adventures. Official launcher for HoYoverse games.">
    <title>HoyoPlay — Launcher</title>

    <link rel="stylesheet" href="assets/base.css">
</head>
<body>
    <!-- home -->
    <section class="home">
        <div class="text">
            <div class="header">
                <div class="frm">
                    <img src="assets/img/frm.png" alt="">
                </div>
                <div class="logo">
                    <img src="assets/img/hoyo.png" alt="">
                    <img src="assets/img/four.png" alt="" class="four">
                </div>
                <div class="web">
                    <img src="assets/img/web.png" alt="">
                </div>
                <div class="grsmall">
                    <img src="assets/img/grsmall.png" alt="">
                </div>
            </div>
            <div class="main">
                <div class="main-icon">
                    <img src="assets/img/icon1.png" alt="">
                </div>
                <div class="main-hoyo">
                    <img src="assets/img/hoyoplay.png" alt="">
                </div>
                <div class="main-text">
                    The click that launched a thousand adventures
                </div>
                <div class="main-btn">
                    <img src="assets/img/comp.png" alt="">
                    Download Now
                </div>
            </div>
            <div class="bottom">
                <img src="assets/img/gr.png" alt="" class="gr">
                <img src="assets/img/connect.png" alt="" class="connect">
                <img src="assets/img/tech.png" alt="" class="tech">
            </div>
            <img src="assets/img/back1.png" alt="" class="ph">
            <video src="assets/img/vid1.mp4" loop autoplay muted class="video1"></video>
        </div>
    </section>
</body>
</html>
